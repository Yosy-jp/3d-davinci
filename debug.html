<!DOCTYPE html>
<html>
<head>
    <title>USB Capture Force Search</title>
    <meta charset="utf-8">
</head>
<body style="background: #111; color: #0f0; font-family: monospace; padding: 20px;">
    <h3>USBデバイス強制認識モード</h3>
    <div id="status">準備中...</div>
    <div id="btnArea"></div>
    <video id="v" autoplay playsinline style="width: 100%; border: 1px solid #555;"></video>

    <script>
        const status = document.getElementById('status');
        const btnArea = document.getElementById('btnArea');
        const video = document.getElementById('v');

        async function forceDiscover() {
            try {
                status.innerText = "1. 初期権限を取得中...";
                // 最初に一度カメラを動かさないと、ブラウザは他のデバイスを認識しません
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                status.innerText = "2. 全デバイスを再スキャン中...";
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                // ビデオ入力だけを抽出
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                status.innerText = `見つかった数: ${videoDevices.length}個\n(HDMI Linkを完全に終了してから試してください)`;

                btnArea.innerHTML = "";
                videoDevices.forEach((d, i) => {
                    const btn = document.createElement('button');
                    btn.style = "display:block; width:100%; padding:20px; margin:10px 0; background:#333; color:#fff; border:1px solid #0f0;";
                    // ラベルが空の場合は「Device [i]」と表示
                    btn.innerText = `[${i}] ${d.label || 'USB Video / External Camera'}`;
                    
                    btn.onclick = async () => {
                        // 既存のストリームを停止
                        if(video.srcObject) {
                            video.srcObject.getTracks().forEach(t => t.stop());
                        }
                        
                        try {
                            const s = await navigator.mediaDevices.getUserMedia({
                                video: { deviceId: { exact: d.deviceId } }
                            });
                            video.srcObject = s;
                            status.innerText = `再生中: ${d.label}`;
                        } catch(e) {
                            status.innerText = "エラー: " + e.message;
                        }
                    };
                    btnArea.appendChild(btn);
                });

                // 一時的なストリームを止める
                tempStream.getTracks().forEach(t => t.stop());

            } catch (err) {
                status.innerText = "失敗: " + err.message;
            }
        }

        forceDiscover();
    </script>
</body>
</html>
