<!DOCTYPE html>
<html>
<head>
    <title>USB Signal Finder</title>
    <meta charset="utf-8">
</head>
<body style="background: #000; color: #fff; font-family: sans-serif; text-align: center;">
    <h3>USB映像信号 探索モード</h3>
    <p id="status">準備中...</p>
    
    <video id="v" autoplay playsinline style="width: 90%; border: 2px solid #0f0;"></video>
    
    <div id="controls" style="margin-top: 20px;">
        <button id="nextBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px;">
            次のカメラに切り替え（USBを探す）
        </button>
    </div>

    <script>
        let currentStream = null;
        let deviceIndex = 0;
        let videoDevices = [];
        const video = document.getElementById('v');
        const status = document.getElementById('status');

        async function init() {
            try {
                // 1. まず適当にカメラを起動してリストを取得可能にする
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                status.innerText = `認識されたカメラ数: ${videoDevices.length}個\nボタンを押して切り替えてください。`;
                
                // 最初の映像を表示
                showDevice(0);
            } catch (err) {
                status.innerText = "エラー: " + err.message;
            }
        }

        async function showDevice(index) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }

            const device = videoDevices[index];
            status.innerText = `試行中 [${index+1}/${videoDevices.length}]: ${device.label || '外部カメラ'}`;

            try {
                // 解像度をあえて指定せず、USBキャプチャの信号を受け入れやすくする
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: device.deviceId } }
                });
                video.srcObject = currentStream;
            } catch (e) {
                status.innerText = `エラー: ${e.message}\n(USBの信号が来ていない可能性があります)`;
            }
        }

        document.getElementById('nextBtn').onclick = () => {
            deviceIndex = (deviceIndex + 1) % videoDevices.length;
            showDevice(deviceIndex);
        };

        init();
    </script>
</body>
</html>
