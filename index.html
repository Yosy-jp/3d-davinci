<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DaVinci 3D MR - Hand Tracking</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<video id="videoSource" autoplay playsinline style="display:none"></video>

<a-scene xr-mode-ui="enabled: true" webxr="optionalFeatures: passthrough, periods-of-track-hand; referenceSpaceType: local">
<a-sky color="#000000" material="transparent: true; opacity: 0"></a-sky>

<a-entity id="monitor-group" position="0 1.5 -0.8" class="clickable" gesture-detector>
<a-video src="#videoSource" width="1.6" height="0.9" position="-0.01 0 0" clip="0 0 0.5 1"></a-video>
<a-video src="#videoSource" width="1.6" height="0.9" position="0.01 0 0" clip="0.5 0 1 1"></a-video>

<a-box width="1.7" height="1.0" depth="0.1" material="visible: false" class="raycast-target"></a-box>
</a-entity>

<a-entity hand-tracking-controls="hand: left"></a-entity>
<a-entity hand-tracking-controls="hand: right" raycaster="objects: .raycast-target; showLine: true; far: 2" cursor="rayOrigin: mouse"></a-entity>
</a-scene>

<script>
async function startCamera() {
const video = document.getElementById('videoSource');
try {
const stream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 1920 }, height: { ideal: 1080 } }
});
video.srcObject = stream;
} catch (err) { console.error("Camera error:", err); }
}
document.addEventListener('click', startCamera);

// 左右映像切り分け
AFRAME.registerComponent('clip', {
schema: { type: 'vec4' },
init: function () {
this.el.addEventListener('materialtexturedrawn', () => {
const mesh = this.el.getObject3D('mesh');
if (mesh && mesh.material.map) {
mesh.material.map.repeat.set(this.data.z - this.data.x, 1);
mesh.material.map.offset.set(this.data.x, 0);
}
});
}
});

// ハンドジェスチャー操作（移動・拡大）の実装
AFRAME.registerComponent('gesture-detector', {
init: function () {
this.internalScale = 1.0;
this.el.addEventListener('mousedown', (e) => {
this.isGrabbing = true;
this.hand = e.detail.cursorEl;
});
window.addEventListener('mouseup', () => { this.isGrabbing = false; });
},
tick: function () {
if (this.isGrabbing && this.hand) {
// 1. 移動：手の位置に追従
const handPos = this.hand.object3D.position;
this.el.object3D.position.lerp(handPos, 0.1);

// 2. 向き：常に自分のほうを向くように調整（必要に応じて）
}
}
});
</script>
</body>
</html>
