<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DaVinci 3D MR - Grab Mode</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<video id="videoSource" autoplay playsinline style="display:none"></video>

<a-scene xr-mode-ui="enabled: true" renderer="antialias: true">
<a-sky color="#000000" material="transparent: true; opacity: 0"></a-sky>

<a-entity id="monitor-group" position="0 1.5 -1.2" class="clickable" grabbable>
<a-video src="#videoSource" width="1.6" height="0.9" position="-0.01 0 0" clip="0 0 0.5 1"></a-video>
<a-video src="#videoSource" width="1.6" height="0.9" position="0.01 0 0" clip="0.5 0 1 1"></a-video>

<a-plane width="1.7" height="1.0" position="0 0 -0.01" material="color: #333; opacity: 0.1" class="raycast-target"></a-plane>
</a-entity>

<a-entity oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .raycast-target"></a-entity>
<a-entity oculus-touch-controls="hand: left"></a-entity>
</a-scene>

<script>
// カメラ（キャプチャボード）の起動
async function startCamera() {
const video = document.getElementById('videoSource');
try {
const stream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 1920 }, height: { ideal: 1080 } }
});
video.srcObject = stream;
} catch (err) { console.error("Camera error:", err); }
}

// 画面クリックでカメラ起動
document.addEventListener('click', startCamera);

// 映像を左右に切り分けるコンポーネント
AFRAME.registerComponent('clip', {
schema: { type: 'vec4' },
init: function () {
this.el.addEventListener('materialtexturedrawn', () => {
const mesh = this.el.getObject3D('mesh');
if (mesh.material.map) {
mesh.material.map.repeat.set(this.data.z - this.data.x, 1);
mesh.material.map.offset.set(this.data.x, 0);
}
});
}
});

// 簡易的な「掴んで移動」ロジック
AFRAME.registerComponent('grabbable', {
init: function () {
this.el.addEventListener('mousedown', (e) => {
this.isGrabbing = true;
this.controller = e.detail.cursorEl;
});
window.addEventListener('mouseup', () => { this.isGrabbing = false; });
},
tick: function () {
if (this.isGrabbing && this.controller) {
// コントローラーの位置をターゲットに補間移動（スムーズな追従）
const targetPos = this.controller.object3D.position;
this.el.object3D.position.lerp(targetPos, 0.1);
}
}
});
</script>
</body>
</html>
